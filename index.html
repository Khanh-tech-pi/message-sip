<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>mesSIP.com</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jssip/3.9.1/jssip.min.js"></script>
</head>
<body style="background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px;">

    <div style="max-width: 400px; margin: auto; background: #222; padding: 20px; border-radius: 15px; border: 2px solid #4285f4;">
        <h2 style="color: #4285f4;">mesSIP.com</h2>
        <div id="status" style="color: #f4b400; font-weight: bold; margin-bottom: 20px;">Chưa đăng nhập</div>

        <input type="text" id="sip_user" placeholder="Tên Linphone" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
        <input type="password" id="sip_pass" placeholder="Mật khẩu" style="width: 90%; padding: 10px; margin-bottom: 20px; border-radius: 5px;">

        <button onclick="startSIP()" style="width: 95%; padding: 12px; background: #4285f4; color: white; border: none; border-radius: 25px; cursor: pointer;">Đăng nhập mesSIP</button>

        <hr style="margin: 20px 0; border: 0.1px solid #444;">

        <input type="text" id="target" placeholder="Gọi tới" style="width: 90%; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
        <button onclick="callAudio()" style="width: 45%; padding: 10px; background: #34a853; color: white; border: none; border-radius: 5px;">📞 Gọi</button>
    </div>

    <script>
    var ua;
    function startSIP() {
        // Kiểm tra xem JsSIP đã load chưa
        if (typeof JsSIP === "undefined") {
            alert("Lỗi: Thư viện chưa load xong, hãy đợi 5 giây hoặc F5!");
            return;
        }

        var user = document.getElementById('sip_user').value;
        var pass = document.getElementById('sip_pass').value;
        
        var socket = new JsSIP.WebSocketInterface('wss://sip.linphone.org:4443');
        var config = {
            sockets: [ socket ],
            uri: 'sip:' + user + '@sip.linphone.org',
            password: pass
        };

        ua = new JsSIP.UA(config);
        ua.start();

        ua.on('registered', () => {
            document.getElementById('status').innerText = "Đã Online ✅";
            document.getElementById('status').style.color = "#34a853";
        });

        ua.on('registrationFailed', (data) => {
            document.getElementById('status').innerText = "Lỗi đăng nhập ❌";
            console.log("Lỗi cụ thể:", data.cause);
        });
    }

    function callAudio() {
        if (!ua) { alert("Hãy đăng nhập trước!"); return; }
        var dest = document.getElementById('target').value;
        ua.call(dest, { mediaConstraints: { audio: true, video: false } });
    }
    </script>
</body>
</html>

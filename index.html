<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mesSIP - Lite</title>
    <script src="https://cdn.jsdelivr.net/npm/jssip@3.9.1/dist/jssip.min.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 320px; background: #1e1e1e; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { color: #f4b400; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #4285f4; margin-bottom: 5px;">mesSIP</h2>
    <div id="status">Chờ đăng nhập...</div>

    <input type="text" id="sip_user" placeholder="Tên Linphone (vd: galaxya10vn)">
    <input type="password" id="sip_pass" placeholder="Mật khẩu">
    <button onclick="startSIP()" style="background: #4285f4; color: white;">ĐĂNG NHẬP</button>

    <hr style="border: 0.5px solid #333; margin: 20px 0;">

    <input type="text" id="target" placeholder="Gọi tới (vd: 101@sip.linphone.org)">
    <button onclick="callAudio()" style="background: #34a853; color: white;">📞 GỌI AUDIO</button>
</div>

<script>
    var ua;
    function startSIP() {
        if (typeof JsSIP === "undefined") {
            alert("Đang tải thư viện, đợi 3s rồi nhấn lại nhé!"); return;
        }
        var user = document.getElementById('sip_user').value;
        var pass = document.getElementById('sip_pass').value;
        var socket = new JsSIP.WebSocketInterface('wss://sip.linphone.org:4443');
        var config = {
            sockets: [ socket ],
            uri: 'sip:' + user + '@sip.linphone.org',
            password: pass
        };
        ua = new JsSIP.UA(config);
        ua.start();
        ua.on('registered', () => {
            document.getElementById('status').innerText = "ONLINE ✅";
            document.getElementById('status').style.color = "#34a853";
        });
        ua.on('registrationFailed', (e) => {
            document.getElementById('status').innerText = "LỖI: " + e.cause;
        });
    }

    function callAudio() {
        if (!ua || !ua.isRegistered()) { alert("Chưa Online!"); return; }
        var dest = document.getElementById('target').value;
        ua.call(dest, { mediaConstraints: { audio: true, video: false } });
    }
</script>

</body>
</html>
